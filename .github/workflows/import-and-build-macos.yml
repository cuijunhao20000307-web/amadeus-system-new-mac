name: Import Amadeus Source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Import upstream source
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tmpdir=$(mktemp -d)
          git clone --depth=1 https://github.com/ai-poet/amadeus-system-new.git "$tmpdir/upstream"
          rm -rf "$tmpdir/upstream/.git"

          find . -mindepth 1 \
            ! -path './.git' \
            ! -path './.git/*' \
            ! -path './.github' \
            ! -path './.github/*' \
            -exec rm -rf {} +

          cp -a "$tmpdir/upstream/." .
          mkdir -p .github/workflows

          cat > .github/workflows/build-macos.yml <<'YAML'
          name: Build macOS

          on:
            workflow_dispatch:
            push:
              branches:
                - main

          permissions:
            contents: read

          jobs:
            build-macos:
              runs-on: macos-14
              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: 18

                - name: Setup pnpm
                  uses: pnpm/action-setup@v4
                  with:
                    version: 9

                - name: Verify package.json
                  run: ls -la && test -f package.json

                - name: Install frontend deps
                  run: pnpm install --no-frozen-lockfile

                - name: Install service deps
                  run: |
                    cd service
                    pnpm install --no-frozen-lockfile

                - name: Build macOS arm64 app
                  run: |
                    pnpm build
                    pnpm build:api
                    npx electron-builder --mac dmg --arm64 -c.mac.identity=null -c.mac.notarize=false

                - name: Upload macOS artifact
                  uses: actions/upload-artifact@v4
                  with:
                    name: Amadeus-macOS-arm64
                    path: |
                      dist_electron/*.dmg
                      dist_electron/*.zip
                      release/*.dmg
                      release/*.zip
                      dist/*.dmg
                      dist/*.zip
                      *.dmg
                      *.zip
          YAML

          python3 - <<'PY'
          from pathlib import Path
          p = Path('.github/workflows/build-macos.yml')
          lines = p.read_text().splitlines()
          p.write_text('\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n')
          PY

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Import upstream Amadeus source"
            git push
          fi
