name: Build macOS

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Clone upstream source
        run: |
          git clone --depth=1 https://github.com/ai-poet/amadeus-system-new.git amadeus-src
          cd amadeus-src
          ls -la
          test -f package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend deps
        working-directory: amadeus-src
        run: pnpm install --no-frozen-lockfile

      - name: Install service deps
        working-directory: amadeus-src/service
        run: pnpm install --no-frozen-lockfile

      - name: Build macOS arm64 app
        working-directory: amadeus-src
        run: |
          pnpm build
          pnpm build:api
          npx electron-builder --mac dmg --arm64 -c.mac.identity=null -c.mac.notarize=false

      - name: Show output files
        working-directory: amadeus-src
        run: |
          find . -maxdepth 5 \( -name '*.dmg' -o -name '*.zip' -o -name '*.app' \) -print

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Amadeus-macOS-arm64
          path: |
            amadeus-src/**/*.dmg
            amadeus-src/**/*.zip
            amadeus-src/**/*.app
          if-no-files-found: error
