name: FINAL Build macOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Clone source
        run: |
          git clone --depth=1 https://github.com/ai-poet/amadeus-system-new.git src

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        working-directory: src
        run: pnpm install --no-frozen-lockfile

      # ✅ 修 i18n 依赖
      - name: Fix missing deps
        working-directory: src
        run: |
          pnpm add i18next react-i18next
          pnpm add i18next-browser-languagedetector

      # ✅ 修 notarize（关键）
      - name: Fix notarize
        working-directory: src
        run: |
          node -e "
          const fs=require('fs');
          let pkg=JSON.parse(fs.readFileSync('package.json'));
          if(pkg.build && pkg.build.mac){
            delete pkg.build.mac.notarize;
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg,null,2));
          "

      # ✅ 修递归打包（ENAMETOOLONG关键）
      - name: Fix build config (no recursion)
        working-directory: src
        run: |
          node -e "
          const fs=require('fs');
          let pkg=JSON.parse(fs.readFileSync('package.json'));

          pkg.build = pkg.build || {};
          pkg.build.files = [
            'dist/**/*',
            'service/**/*',
            '!dist/mac/**/*',
            '!dist/mac-arm64/**/*'
          ];

          fs.writeFileSync('package.json', JSON.stringify(pkg,null,2));
          "

      # ✅ 安装后端
      - name: Install service deps
        working-directory: src/service
        run: pnpm install --no-frozen-lockfile

      # ✅ 构建
      - name: Build App
        working-directory: src
        run: |
          pnpm build
          pnpm build:api
          npx electron-builder --mac dmg --arm64

      # ✅ 上传
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: src/**/*.dmg
