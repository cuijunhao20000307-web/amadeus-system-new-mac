name: FINAL FIX Build macOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Clone source
        run: |
          git clone --depth=1 https://github.com/ai-poet/amadeus-system-new.git src

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        working-directory: src
        run: pnpm install --no-frozen-lockfile

      # ✅ 修依赖
      - name: Fix deps
        working-directory: src
        run: |
          pnpm add i18next react-i18next i18next-browser-languagedetector

      # ✅ 修 notarize
      - name: Fix notarize
        working-directory: src
        run: |
          node -e "
          const fs=require('fs');
          let pkg=JSON.parse(fs.readFileSync('package.json'));
          if(pkg.build && pkg.build.mac){
            delete pkg.build.mac.notarize;
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg,null,2));
          "

      # 🔥🔥🔥 核心修复（彻底阻止递归）
      - name: HARD FIX recursion
        working-directory: src
        run: |
          node -e "
          const fs=require('fs');
          let pkg=JSON.parse(fs.readFileSync('package.json'));

          pkg.build = {
            appId: 'amadeus.app',
            productName: 'Amadeus',
            files: [
              'dist/**/*',
              'service/**/*',
              'package.json'
            ],
            directories: {
              buildResources: 'build'
            }
          };

          fs.writeFileSync('package.json', JSON.stringify(pkg,null,2));
          "

      - name: Install service deps
        working-directory: src/service
        run: pnpm install --no-frozen-lockfile

      - name: Build App
        working-directory: src
        run: |
          pnpm build
          pnpm build:api
          npx electron-builder --mac dmg --arm64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: src/**/*.dmg
