name: FINAL Build macOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Clone source
        run: |
          git clone --depth=1 https://github.com/ai-poet/amadeus-system-new.git src

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        working-directory: src
        run: pnpm install --no-frozen-lockfile

      - name: FIX NOTARIZE (关键)
        working-directory: src
        run: |
          node -e "
          const fs=require('fs');
          let pkg=JSON.parse(fs.readFileSync('package.json'));
          if(pkg.build && pkg.build.mac){
            delete pkg.build.mac.notarize;
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg,null,2));
          "

      - name: Build App
        working-directory: src
        run: |
          pnpm build
          pnpm build:api
          npx electron-builder --mac dmg --arm64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: src/**/*.dmg
