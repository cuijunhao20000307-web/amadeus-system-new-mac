name: FINAL ULTIMATE BUILD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Clone source
        run: git clone --depth=1 https://github.com/ai-poet/amadeus-system-new.git src

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        working-directory: src
        run: pnpm install --no-frozen-lockfile

      # ✅ 修缺失依赖
      - name: Fix deps
        working-directory: src
        run: |
          pnpm add i18next react-i18next i18next-browser-languagedetector

      # ✅ 修 notarize
      - name: Fix notarize
        working-directory: src
        run: |
          node -e "
          const fs=require('fs');
          let pkg=JSON.parse(fs.readFileSync('package.json'));
          if(pkg.build && pkg.build.mac){
            delete pkg.build.mac.notarize;
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg,null,2));
          "

      # 🔥🔥🔥 核心修复：彻底阻止递归
      - name: HARD CLEAN (关键)
        working-directory: src
        run: |
          rm -rf dist
          rm -rf build
          rm -rf *.app
          rm -rf *.dmg

      - name: Install service deps
        working-directory: src/service
        run: pnpm install --no-frozen-lockfile

      # 🚀 先构建前端+后端
      - name: Build project
        working-directory: src
        run: |
          pnpm build
          pnpm build:api

      # 🔥🔥🔥 再清一次（防止 dist 被带入）
      - name: CLEAN AGAIN (防递归)
        working-directory: src
        run: |
          rm -rf dist/mac*
          rm -rf dist/**/*.app || true

      # 🚀 最终打包
      - name: Build dmg
        working-directory: src
        run: |
          npx electron-builder --mac dmg --arm64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: src/**/*.dmg
