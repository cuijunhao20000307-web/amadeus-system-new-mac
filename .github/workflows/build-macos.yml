name: 00 Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Clone source
        run: |
          git clone --depth=1 https://github.com/ai-poet/amadeus-system-new.git src
          cd src
          test -f package.json
          ls -la

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install root deps
        working-directory: src
        run: pnpm install --no-frozen-lockfile

      - name: Add missing i18n deps
        working-directory: src
        run: |
          pnpm add i18next react-i18next
          pnpm add i18next-browser-languagedetector

      - name: Install service deps
        working-directory: src/service
        run: pnpm install --no-frozen-lockfile

      - name: Fix invalid config (remove notarize)
        working-directory: src
        run: |
          sed -i '' '/notarize/d' package.json

      - name: Build dmg
        working-directory: src
        run: |
          pnpm build
          pnpm build:api
          npx electron-builder --mac dmg --arm64

      - name: List output
        working-directory: src
        run: find . -maxdepth 5 -name '*.dmg' -o -name '*.zip'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Amadeus-macOS-arm64
          path: |
            src/**/*.dmg
            src/**/*.zip
          if-no-files-found: error
